version: "3.8"

# ─── Customer Segmentation MLOps Stack ───────────────────────────────────────
# Services:
#   mlflow       — experiment tracking UI + model registry  (port 5001)
#   airflow-init — one-time Airflow DB init + admin user creation
#   airflow-web  — Airflow webserver UI                     (port 8080)
#   airflow-scheduler — Airflow scheduler
#
# Usage:
#   docker compose up -d
#   Open MLflow:  http://localhost:5001
#   Open Airflow: http://localhost:8080  (admin / admin)

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    MLFLOW_TRACKING_URI: "http://mlflow:5001"
    SEG_OUTPUT_DIR: "/opt/airflow/seg_output"
    SEG_N_CLUSTERS: "4"
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      mlflow==2.14.0
      scikit-learn==1.4.2
      lightgbm==4.3.0
      pandas==2.2.2
      numpy==1.26.4
      matplotlib==3.9.0
      seaborn==0.13.2
      pyarrow==16.0.0
      joblib==1.4.0
  volumes:
    - ./dags:/opt/airflow/dags
    - ./output:/opt/airflow/seg_output
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL (Airflow metadata DB) ───────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow==2.14.0 psycopg2-binary && \
               mlflow server \
                 --host 0.0.0.0 \
                 --port 5001 \
                 --backend-store-uri sqlite:////mlflow/mlflow.db \
                 --default-artifact-root /mlflow/artifacts"
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      retries: 5

  # ── Airflow init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db init &&
          airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com"
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────────────────────
  airflow-web:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  mlflow_data:
  airflow_logs:
